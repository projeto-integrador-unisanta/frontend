<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fiscaliza Brazil</title>
    <!-- Fonte Inter (Sans-serif moderna) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom Scrollbar para Chrome, Edge e Safari */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px; /* Bem fininha */
      }

      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent; /* Fundo invisível para não poluir */
      }

      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #d1d5db; /* Cor cinza clara (gray-300) */
        border-radius: 20px;
        border: 2px solid transparent; /* Cria um respiro interno */
      }

      /* Estilo para o Dark Mode */
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #3b82f6; /* Azul vibrante no dark mode */
        opacity: 0.5;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background-color: #3b82f6; /* Fica azul ao passar o mouse */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
